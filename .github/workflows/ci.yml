name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests tools
      - name: Typecheck
        run: python -m mypy src
      - name: Unit
        run: python -m pytest -m "not live"

  native-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install toolchain
        run: |
          brew update
          brew install cmake pkg-config opus portaudio
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Build native
        run: TELECALLS_BUILD_NATIVE=1 python tools/build_native.py
      - name: Calls unit lane
        run: python -m pytest tests/unit/calls -q
